# dist configuration — produces per-target binary archives plus
# shell/powershell installers. release-please owns the whole release: it
# publishes the `wick-v<version>` GitHub Release (creating the tag), and the
# `release: published` event triggers dist to build the binaries and upload
# them onto that release.
#
# Edit this file when adding targets / installers, then regenerate the
# workflow with:
#     dist generate
# which rewrites .github/workflows/release.yml. NOTE: `dist generate` emits an
# `on: push: tags` trigger; we hand-edit it to `on: release: published`
# (release-please creates tags via the API, which doesn't reliably fire
# `push`). Re-apply that trigger edit after any regenerate. `allow-dirty =
# ["ci"]` tells dist we own that file so its `generate --check` won't abort.

[workspace]
members = ["cargo:."]

[dist]
# Pin the dist version CI runs — bumps come through PRs so the generated
# release.yml stays in lockstep.
cargo-dist-version = "0.32.0"

# CI provider.
ci = "github"

# uv-style installers: `curl ... | sh` on Unix, `irm ... | iex` on Windows.
installers = ["shell", "powershell"]

# Archive formats per platform.
windows-archive = ".zip"
unix-archive = ".tar.gz"

# Target triples we ship prebuilt binaries for. Linux gets both gnu and musl
# (older distros and Alpine both work); macOS is Apple Silicon; Windows is
# x64.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Keep the tarballs to just the binary the installer drops on PATH.
auto-includes = false

# release-please publishes the GitHub Release (with the changelog body) and
# creates the tag; dist only attaches the built binaries.
create-release = false

# We hand-edit release.yml's trigger to `on: release: published`, so tell dist
# we own the CI file and skip its `generate --check`.
allow-dirty = ["ci"]

# Don't run dist on PRs — CI already covers building.
pr-run-mode = "skip"

# release-please tags as `wick-v<version>` rather than the bare `v<version>`
# dist defaults to.
tag-namespace = "wick"

# Where the shell installer drops the binary. Matches uv's layout so installs
# land on PATH without extra config.
install-path = ["$XDG_BIN_HOME/", "$XDG_DATA_HOME/../bin", "~/.local/bin"]

# Mirror first, GitHub fallback. The "simple" host MUST be listed in `hosting`
# for it to reach the generated installer — `simple-download-url` alone only
# *enables* the host; order here is the download precedence the shell/
# powershell installers use (try the mirror, fall back to the GitHub release
# if it's offline / hasn't ingested the new tag yet). This matches the PHP
# launcher (packaging/composer) and `bougie format`.
hosting = ["simple", "github"]

# The cresset origin mirror (shared origin.bougie.tools box; see
# publish-mirror.yml + cresset-tools/infra). Versioned artifacts live at
# `<host>/github/wick/releases/download/<tag>/<file>` — the layout
# publish-mirror.yml rsyncs to.
simple-download-url = "https://releases.bougie.tools/github/wick/releases/download/{tag}"

# Run publish-mirror after the release is announced to fan the dist artifacts
# out to the origin server. (release.yml is hand-edited, so this also exists
# as an explicit `custom-publish-mirror` job there; keep them in sync.)
post-announce-jobs = ["./publish-mirror"]

# publish-mirror only needs to read the uploaded artifacts.
github-custom-job-permissions = { "publish-mirror" = { contents = "read" } }

# NOTE: we intentionally do NOT pin the gnu build to a glibc-2.17 floor
# (the manylinux2014-container trick bougie uses). Running the whole job
# in a glibc-2.17 image breaks GitHub Actions' Node 24 (needs glibc
# >= 2.28), and the host-runner-checkout workaround bougie carries is
# overkill for a formatter. The linux-gnu binary is built natively on
# the runner (modern glibc); users on old distros use the static
# `x86_64-unknown-linux-musl` archive, which runs anywhere.

[dist.binaries]
"*" = ["wick"]
